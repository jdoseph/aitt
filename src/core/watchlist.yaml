# AI data-center value-chain watchlist.
# Schema per entry: {ticker, name, layer, notes}
# `layer` must be one of the keys in `layers:` below (used for ordering/colors).
# Edit freely — the agent hot-reloads this file on the next evaluation cycle.

# Ordered layer definitions (display order + human-readable titles).
layers:
  layer1: "Layer 1 — GPU / Accelerator Makers"
  layer2: "Layer 2 — ASIC Co-designers"
  layer3: "Layer 3 — Semiconductors (analog, memory, IP)"
  layer4: "Layer 4 — Networking & Interconnects"
  layer5: "Layer 5 — Power & Electrical"
  layer6: "Layer 6 — Cooling & Thermal"
  layer7: "Layer 7 — OEMs / Server Builders"
  layer8: "Layer 8 — Data Center REITs"
  layer9: "Layer 9 — Space & Adjacent"
  layer10: "Layer 10 — Pre-IPO Proxies / AI Model Layer"

tickers:
  # --- Layer 1: GPU / Accelerator Makers ---
  - ticker: NVDA
    name: NVIDIA
    layer: layer1
    notes: "75-86% DC AI market share, $115B DC revenue FY2025"
  - ticker: AMD
    name: Advanced Micro Devices
    layer: layer1
    notes: "MI-series accelerators, ~$10B DC revenue, 30%+ server CPU share"
  - ticker: INTC
    name: Intel
    layer: layer1
    notes: "Gaudi line, Falcon Shores; weakened but relevant"

